<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="src/main.ts" defer></script>
    <script src="src/tabSwitcher.js" defer></script>
    <title>Tauri App</title>
  </head>
  <body>
    <section class="sections-container">
      <section class="section tabs">
        <button onclick="changeTab(0)" class="pick-btn">
            <h3>Main</h3>
        </button>
        <button onclick="changeTab(1)" class="pick-btn">
            <h3>Tracks</h3>
        </button>
        <button onclick="changeTab(2)" class="pick-btn">
            <h3>Albums</h3>
        </button>
        <button onclick="changeTab(3)" class="pick-btn">
            <h3>Artists</h3>
        </button>
        <button onclick="changeTab(4)" class="pick-btn">
            <h3>Metadata</h3>
        </button>
        <button onclick="changeTab(5)" class="pick-btn">
            <h3>Settings</h3>
        </button>
      </section>
      
      <section class="section main">
        <div class="main-container tracks-queue">
          <h2 class="main-presentable-text">Play queue</h2>
          <button class="pick-btn">
            <h3>Track name</h3>
          </button>
          <button class="pick-btn">
            <h3>Track name</h3>
          </button>
        </div>

        <div class="main-container">
          <h2 class="main-presentable-text">Tracks list</h2>
          <div id="tracks-list">

          </div>
        </div>

        <div class="main-container">
          <h2 class="main-presentable-text">Albums list</h2>
        </div>

        <div class="main-container">
          <h2 class="main-presentable-text">Artists list</h2>
        </div>

        <div class="main-container">
          <h2 class="main-presentable-text">Metadata</h2>
        </div>

        <div class="main-container">
          <h2 class="main-presentable-text">Settings</h2>
          <section class="section musics-path-list">
              <h2>Path</h2>
              <h2>Path</h2>
              <h2>Path</h2>
              <h2>Path</h2>
              <h2>Path</h2>
            </section>
        </div>
      </section>

      <section class="section track-info">
        <h2 class="track-name">Track name</h2>
        <img class="album-cover" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR8lSTbrXUdmDeJ6akFnVFRbPTNMZeO3L-RwA&s">
        <h3 class="album-name">Album name</h3>
      </section>
      <section class="section playback-controll">
        <div style="align-content: end;">
          <button class="playback-player-contoll-btn"><img src="src/assets/back.png"></button>
          <button class="playback-player-contoll-btn"><img src="src/assets/pause.png"></button>
          <button class="playback-player-contoll-btn"><img src="src/assets/next.png"></button>
        </div>
        <input type="range" id="playtime-slider">
      </section>
    </section>
  </body>

  <template id="pick-track-btn-example">
    <button class="pick-btn">
        <h3>Track name</h3>
    </button>
</template>

</html>
