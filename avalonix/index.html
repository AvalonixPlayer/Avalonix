<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="./src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri App</title>
    <script type="module" src="./src/main.ts" defer></script>
  </head>

  <body>
    <section class="section" id="windows">
      <section class="section" id="tabs-sellector">
        <button class="tab-sellect-button">
          <h2>Main</h2>
        </button>
        <button class="tab-sellect-button">
          <h2>Tracks</h2>
        </button>
        <button class="tab-sellect-button">
          <h2>Albums</h2>
        </button>
        <button class="tab-sellect-button">
          <h2>Performers</h2>
        </button>
        <button class="tab-sellect-button">
          <h2>Settings</h2>
        </button>
        <button class="tab-sellect-button">
          <h2>Metadata</h2>
        </button>
      </section>

      <section class="section" id="main-section">
        <section class="section" id="track-preview">
          <img
            id="preview-album-cover"
            src="https://upload.wikimedia.org/wikipedia/ru/b/bf/Meteora.jpg"
          />
          <div>
            <h1>Track name</h1>
            <h2>Performer</h2>
            <h3>Album</h3>
          </div>
        </section>
      </section>

      <section class="section" id="queue-section"></section>
    </section>

    <section class="section" id="playable-controll">
      Playable controll zone
    </section>
  </body>
</html>
