<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="./src/styles/styles.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Avalonix</title>
        <script type="module" src="./src/main.ts" defer></script>
    </head>

    <body>
        <section class="section main-section" id="main-section-base">
            <section class="section" id="left-menu">
                <button class="left-menu-button" id="tracks-tab-button">
                    <img src="./src/assets/track_icon.png" />
                </button>
                <button class="left-menu-button" id="albums-tab-button">
                    <img src="./src/assets/album_icon.png" />
                </button>
                <button class="left-menu-button" id="performers-tab-button">
                    <img src="./src/assets/performer_icon.png" />
                </button>
                <button class="left-menu-button" id="queue-tab-button">
                    <img src="./src/assets/queue.png" />
                </button>
            </section>
            <section class="section main-tab-section" id="tracks-list-section">
            </section>
            <section class="section main-tab-section" id="albums-list-section">
            </section>
            <section class="section main-tab-section" id="performers-list-section">
            </section>
            <section class="section main-tab-section" id="queue-section">
            </section>
            <section class="section main-tab-section" id="track-preview-section">
                Track-preview
            </section>
        </section>
        <section
            class="section main-section"
            id="main-section-track-preview"
        ></section>
        <section class="section footer-section">
            <div id="track-time-controll">
                <h3 id="track-cur-time">0</h3>
                <input type="range" min="0" max="0" value="0" id="play-time-controll-slider"></input>
                <h3 id="track-left-time">0</h3>
            </div>
            <div id="queue-controll">
                <button
                    class="queue-controll-button track-index-controll"
                    id="previous-track"
                >
                    <img src="./src/assets/next_track.png" />
                </button>
                <button class="queue-controll-button" id="pause">
                    <img src="./src/assets/pause.png" />
                </button>
                <button
                    class="queue-controll-button track-index-controll"
                    id="next-track"
                >
                    <img src="./src/assets/next_track.png" />
                </button>
            </div>
        </section>
    </body>
</html>
