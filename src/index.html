<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="./src/styles/styles.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Avalonix</title>
        <script type="module" src="./src/main.ts" defer></script>
    </head>

    <body>
        <section class="section main-section" id="main-section-base">
            <section class="section" id="left-menu">
                <button class="left-menu-button" id="tracks-tab-button">
                    <img src="./src/assets/track_icon.png" />
                </button>
                <button class="left-menu-button" id="albums-tab-button">
                    <img src="./src/assets/album_icon.png" />
                </button>
                <button class="left-menu-button" id="performers-tab-button">
                    <img src="./src/assets/performer_icon.png" />
                </button>
                <button class="left-menu-button" id="queue-tab-button">
                    <img src="./src/assets/queue.png" />
                </button>
                <button class="left-menu-button" id="settings-tab-button">
                    <img src="./src/assets/settings.png" />
                </button>
            </section>
            <section class="section main-tab-section" id="tracks-list-section"></section>
            <section class="section main-tab-section" id="albums-list-section"></section>
            <section class="section main-tab-section" id="performers-list-section"></section>
            <section class="section main-tab-section" id="queue-section"></section>
            <section class="section main-tab-section" id="settings-section">
                <div class="settings-div">
                    <h1>Library</h1>
                    <row>
                        <drop-list id="lib-paths" title="Library paths" add-button="add-path-to-lib"></drop-list>
                    </row>
                </div>
                <div class="settings-div">
                    <h1>Customization</h1>
                    <row>
                        <h3>Text 1 size: </h3>
                        <input id="font-size-input-1" type="number" min="5" max="70">
                    </row>
                    <row>
                        <h3>Text 2 size: </h3>
                        <input id="font-size-input-2" type="number" min="5" max="70">
                    </row>
                    <row>
                        <h3>Text 3 size: </h3>
                        <input id="font-size-input-3" type="number" min="5" max="70">
                    </row>
                    <row>
                        <h3>Text 4 size: </h3>
                        <input id="font-size-input-4" type="number" min="5" max="70">
                    </row>
                    <row>
                        <h3>Use background image: </h3>
                        <input id="use-bg-img" type="checkbox">
                    </row>
                    <row>
                        <h3>Background color: </h3>
                        <input id="set-bg-color" type="color">
                    </row>
                    <row>
                        <h3>Background file(gif): </h3>
                        <button id="set-bg-image-button"><h3>Select</h3></button>
                    </row>

                </div>
                <button id="apply-settings"><h2>Apply settings</h2></button>
            </section>
            <section class="section main-tab-section" id="track-preview-section">
                <div class="album-cover" id="track-preview-cover">
                    <img src="./src/assets/no_cover.jpg">
                </div>

                <div id="set-of-metadata-in-preview">
                    <h1 id="track-title-show">Title</h1>
                    <h2 id="track-album-show">Album</h2>
                    <h3 id="track-performer-show">Performer</h3>
                </div>
            </section>
        </section>
        <section
            class="section main-section"
            id="main-section-track-preview"
        ></section>
        <section class="section footer-section">
            <div id="track-time-controll">
                <h3 id="track-cur-time">0</h3>
                <input type="range" min="0" max="0" value="0" id="play-time-controll-slider"></input>
                <h3 id="track-left-time">0</h3>
            </div>
            <button id="current-track-show-button">
                <h3>Current track title</h3>
            </button>
            <div id="queue-controll">
                <button
                    class="queue-controll-button track-index-controll"
                    id="previous-track"
                >
                    <img src="./src/assets/next_track.png" />
                </button>
                <button class="queue-controll-button" id="pause">
                    <img src="./src/assets/pause.png" />
                </button>
                <button
                    class="queue-controll-button track-index-controll"
                    id="next-track"
                >
                    <img src="./src/assets/next_track.png" />
                </button>
            </div>
        </section>
    </body>

    <template id="drop-list-template">
        <row>
            <button><h2>Menu name</h2></button>
            <button class="drop-list-add-button"><img src="src/assets/add_smth.png"></button>
        </row>
        <div class="drop-list-items" style="display: none; flex-direction: column;"></div>
    </template>

    <template id="drop-list-button-template">
        <button class="drop-list-button"><h3></h3></button>
    </template>
</html>
